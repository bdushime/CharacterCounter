<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Character counter</title>
  </head>
  <body>
    <main class="container">
      <header class="header">
        <img
          src="./assets/images/logo-dark-theme.svg"
          alt="Logo"
          class="header-logo-1"
          id="main-logo"
        />
        <button class="header-toggle" id="theme-toggle-btn">
          <img
            src="./assets/images/icon-sun.svg"
            alt="Toggle Theme"
            class="header-logo-2"
            id="theme-icon"
          />
        </button>
      </header>

      <h1 class="title">
        Analyze your text <span class="title-highlight"> in real-time.</span>
      </h1>

      <div class="counter">
        <textarea
          id="text-input"
          class="counter-input"
          placeholder="Start typing here..."
        ></textarea>
        
        <div class="limit-error-msg" id="limit-error-msg">
          <img src="./assets/images/icon-info.svg" alt="" class="error-icon" />
          <span id="limit-error-text">Limit reached! Your text exceeds 300 characters.</span>
        </div>

        <div class="counter-controls">
          <div class="checkbox-group">
            <label class="checkbox">
              <input id="exclude-spaces-checkbox" type="checkbox" class="checkbox-input" /> Exclude Spaces
            </label>
            <label class="checkbox">
              <input id="char-limit-checkbox" type="checkbox" class="checkbox-input" /> Set Character Limit
            </label>
            <input type="number" id="char-limit-input" class="char-limit-input" value="300" />
          </div>

          <p class="reading-time" id="reading-time-display">
            Approx. reading time: 0 minutes
          </p>
        </div>
      </div>
      <section class="stats-container">
        <article class="stat-card stat-card-purple">
          <span id="char-count" class="stat-number">00</span>
          <span class="stat-label" id="char-count-label">Total Characters</span>
        </article>

        <article class="stat-card stat-card-yellow">
          <span id="word-count" class="stat-number">00</span>
          <span class="stat-label">Word Count</span>
        </article>

        <article class="stat-card stat-card-orange">
          <span id="sentence-count" class="stat-number">00</span>
          <span class="stat-label">Sentence Count</span>
        </article>
      </section>
      <section class="letter-density">
        <h2 class="letter-density-title">Letter Density</h2>
        <div class="density-list" id="letter-density-container">
          <div class="density-row">
            <span class="letter">E</span>
            <div class="bar-container">
              <div class="bar-fill" style="width: 40%"></div>
            </div>
            <span class="percentage">40 (16.06%)</span>
          </div>

          <div class="density-row">
            <span class="letter">I</span>
            <div class="bar-container">
              <div class="bar-fill" style="width: 29%"></div>
            </div>
            <span class="percentage">29 (11.65%)</span>
          </div>

          <div class="density-row">
            <span class="letter">T</span>
            <div class="bar-container">
              <div class="bar-fill" style="width: 28%"></div>
            </div>
            <span class="percentage">28 (11.24%)</span>
          </div>
           <div class="density-row">
            <span class="letter">O</span>
            <div class="bar-container">
              <div class="bar-fill" style="width: 8%"></div>
            </div>
            <span class="percentage">22 (8.84%)</span>
          </div>
           <div class="density-row">
            <span class="letter">N</span>
            <div class="bar-container">
              <div class="bar-fill" style="width: 8%"></div>
            </div>
            <span class="percentage">21 (8.43%)</span>
          </div>
        </div>

        <button class="see-more-btn" id="see-more-btn">
          <span id="see-more-text">See more</span>
          <img
            src="./assets/images/icon-arrow-down.svg"
            alt=""
            class="arrow-icon"
            id="see-more-icon"
          />
        </button>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
