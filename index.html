<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Character counter</title>
  </head>
  <body>
    <main class="container">
      <header class="header">
        <img
          src="./assets/images/logo-dark-theme.svg"
          alt="Logo"
          class="header-logo-1"
        />
        <button class="header-toggle">
          <img
            src="./assets/images/icon-sun.svg"
            alt="Toggle Theme"
            class="header-logo-2"
          />
        </button>
      </header>

      <h1 class="title">
        Analyze your text <span class="title-highlight"> in real-time.</span>
      </h1>

      <div class="counter">
        <textarea
          class="counter-input"
          placeholder="Start typing here..."
        ></textarea>

        <div class="counter-controls">
          <div class="checkbox-group">
            <label class="checkbox">
              <input type="checkbox" class="checkbox-input" /> Exclude Spaces
            </label>
            <label class="checkbox">
              <input type="checkbox" class="checkbox-input" /> Set Character
              Limit
            </label>
          </div>

          <p class="reading-time">
            Approx. reading time: <span id="time-val">1</span> minutes
          </p>
        </div>
      </div>
      <section class="stats-container">
        <article class="stat-card stat-card-purple">
          <span class="stat-number">278</span>
          <span class="stat-label">Total Characters</span>
        </article>

        <article class="stat-card stat-card-yellow">
          <span class="stat-number">39</span>
          <span class="stat-label">Word Count</span>
        </article>

        <article class="stat-card stat-card-orange">
          <span class="stat-number">04</span>
          <span class="stat-label">Sentence Count</span>
        </article>
      </section>
      <section class="letter-density">
        <h2 class="letter-density-title">Letter Density</h2>
        <div class="density-list">
          <div class="density-row">
            <span class="letter">E</span>
            <div class="bar-container">
              <div class="bar-fill" style="width: 40%"></div>
            </div>
            <span class="percentage">40 (16.06%)</span>
          </div>

          <div class="density-row">
            <span class="letter">I</span>
            <div class="bar-container">
              <div class="bar-fill" style="width: 29%"></div>
            </div>
            <span class="percentage">29 (11.65%)</span>
          </div>

          <div class="density-row">
            <span class="letter">T</span>
            <div class="bar-container">
              <div class="bar-fill" style="width: 28%"></div>
            </div>
            <span class="percentage">28 (11.24%)</span>
          </div>
           <div class="density-row">
            <span class="letter">O</span>
            <div class="bar-container">
              <div class="bar-fill" style="width: 8%"></div>
            </div>
            <span class="percentage">22 (8.84%)</span>
          </div>
           <div class="density-row">
            <span class="letter">N</span>
            <div class="bar-container">
              <div class="bar-fill" style="width: 8%"></div>
            </div>
            <span class="percentage">21 (8.43%)</span>
          </div>
        </div>

        <button class="see-more-btn">
          See more
          <img
            src="./assets/images/icon-arrow-down.svg"
            alt=""
            class="arrow-icon"
          />
        </button>
      </section>
    </main>
  </body>
</html>
